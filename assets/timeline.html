<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt timeline</title>
  <style>
    :root {
      --paper: #f3efe5;
      --paper-deep: #e7e0d1;
      --ink: #17211d;
      --muted: #66706a;
      --rule: #c8c2b5;
      --claude: #b54e32;
      --codex: #176a5a;
      --focus: #184d8f;
      --panel: rgba(255, 253, 247, .72);
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, transparent 0 31px, rgba(181, 78, 50, .13) 31px 32px, transparent 32px),
        repeating-linear-gradient(0deg, rgba(23, 33, 29, .028) 0 1px, transparent 1px 28px),
        var(--paper);
    }
    button, input { font: inherit; }
    button { color: inherit; }
    .shell { width: min(1420px, calc(100% - 56px)); margin: 0 auto; padding: 58px 0 90px; }
    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--ink);
    }
    .kicker {
      margin: 0 0 8px;
      color: var(--muted);
      font: 700 11px/1.2 ui-monospace, "SFMono-Regular", Consolas, monospace;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      max-width: 900px;
      font: 500 clamp(30px, 5vw, 62px)/.98 Georgia, "Times New Roman", serif;
      letter-spacing: -.035em;
    }
    .totals { display: flex; gap: 22px; }
    .total { min-width: 82px; }
    .total b { display: block; font: 500 27px/1 Georgia, serif; }
    .total span { color: var(--muted); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
    .controls {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 14px 0;
      background: linear-gradient(var(--paper) 78%, rgba(243, 239, 229, 0));
    }
    .search {
      width: min(520px, 100%);
      border: 0;
      border-bottom: 1px solid var(--rule);
      border-radius: 0;
      padding: 10px 0;
      outline: none;
      background: transparent;
      color: var(--ink);
    }
    .search:focus { border-color: var(--focus); box-shadow: 0 2px 0 -1px var(--focus); }
    .filters { display: flex; gap: 6px; }
    .filter {
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(255,255,255,.3);
      cursor: pointer;
    }
    .filter[aria-pressed="true"] { background: var(--ink); border-color: var(--ink); color: var(--paper); }
    .filter:focus-visible, .node:focus-visible { outline: 3px solid color-mix(in srgb, var(--focus) 38%, transparent); outline-offset: 3px; }
    .status { min-height: 26px; margin: 6px 0 18px; color: var(--muted); font-size: 12px; }
    .timeline { border-top: 1px solid var(--rule); }
    .session {
      --provider: var(--codex);
      display: grid;
      grid-template-columns: minmax(240px, 34%) minmax(0, 1fr);
      gap: 28px;
      padding: 29px 0 26px;
      border-bottom: 1px solid var(--rule);
    }
    .session[data-platform="claude"] { --provider: var(--claude); }
    .session[hidden] { display: none; }
    .session-head { min-width: 0; }
    .provider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .provider {
      color: var(--provider);
      font: 800 10px/1 ui-monospace, "SFMono-Regular", Consolas, monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .provider::before { content: ""; display: inline-block; width: 7px; height: 7px; margin-right: 7px; border-radius: 50%; background: currentColor; }
    .session-time { color: var(--muted); font: 11px/1.3 ui-monospace, "SFMono-Regular", Consolas, monospace; }
    .session h2 { margin: 0; font: 500 clamp(18px, 2vw, 26px)/1.14 Georgia, serif; overflow-wrap: anywhere; }
    .session-meta { margin: 12px 0 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .session-id { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: ui-monospace, Consolas, monospace; }
    .session-body { min-width: 0; }
    .track-wrap { overflow-x: auto; padding: 4px 0 2px; scrollbar-width: thin; }
    .track {
      position: relative;
      min-width: 540px;
      height: 84px;
      touch-action: pan-x;
    }
    .pulse { position: absolute; inset: 0; width: 100%; height: 84px; overflow: visible; pointer-events: none; }
    .pulse path { fill: none; stroke: var(--provider); stroke-width: 1.35; vector-effect: non-scaling-stroke; opacity: .58; }
    .node {
      --lift: 0px;
      position: absolute;
      left: var(--x);
      top: 42px;
      width: 15px;
      height: 15px;
      border: 2px solid var(--paper);
      border-radius: 50%;
      background: var(--provider);
      box-shadow: 0 0 0 1px var(--provider);
      cursor: pointer;
      transform: translate(-50%, calc(-50% + var(--lift))) scale(.72);
      transition: transform 150ms ease, box-shadow 150ms ease;
    }
    .node:hover, .node[aria-pressed="true"] { transform: translate(-50%, calc(-50% + var(--lift))) scale(1.12); box-shadow: 0 0 0 4px color-mix(in srgb, var(--provider) 18%, transparent); }
    .detail {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 20px;
      min-height: 0;
      margin-top: 8px;
      padding: 0;
      border-left: 2px solid var(--provider);
      background: var(--panel);
      opacity: 0;
      overflow: hidden;
      max-height: 0;
      transition: max-height 240ms ease, opacity 180ms ease, padding 240ms ease;
    }
    .detail[data-open="true"] { max-height: 720px; padding: 16px 18px; opacity: 1; overflow: auto; }
    .detail-meta { color: var(--muted); font: 11px/1.6 ui-monospace, "SFMono-Regular", Consolas, monospace; overflow-wrap: anywhere; }
    .detail-meta b { color: var(--provider); text-transform: uppercase; }
    .prompt { margin: 0; white-space: pre-wrap; overflow-wrap: anywhere; font: 14px/1.65 ui-monospace, "SFMono-Regular", Consolas, monospace; }
    .empty { padding: 80px 0; color: var(--muted); font: 24px/1.3 Georgia, serif; }
    .footer { display: flex; justify-content: space-between; gap: 20px; margin-top: 25px; color: var(--muted); font-size: 11px; }
    @media (max-width: 800px) {
      body { background: repeating-linear-gradient(0deg, rgba(23, 33, 29, .028) 0 1px, transparent 1px 28px), var(--paper); }
      .shell { width: min(100% - 30px, 760px); padding-top: 30px; }
      .masthead, .controls, .session { grid-template-columns: 1fr; }
      .masthead { align-items: start; }
      .totals { margin-top: 4px; }
      .controls { gap: 10px; }
      .filters { overflow-x: auto; padding-bottom: 3px; }
      .session { gap: 14px; }
      .detail { grid-template-columns: 1fr; }
      .footer { flex-direction: column; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="masthead">
      <div>
        <p class="kicker">Prompt field record</p>
        <h1 id="project-name">Project timeline</h1>
      </div>
      <div class="totals" aria-label="统计">
        <div class="total"><b id="event-total">0</b><span>prompts</span></div>
        <div class="total"><b id="session-total">0</b><span>sessions</span></div>
      </div>
    </header>

    <section class="controls" aria-label="筛选提示词">
      <input id="search" class="search" type="search" placeholder="搜索用户提示词…" autocomplete="off">
      <div class="filters" role="group" aria-label="按平台筛选">
        <button class="filter" type="button" data-filter="all" aria-pressed="true">全部</button>
        <button class="filter" type="button" data-filter="claude" aria-pressed="false">Claude</button>
        <button class="filter" type="button" data-filter="codex" aria-pressed="false">Codex</button>
      </div>
    </section>
    <p id="status" class="status" aria-live="polite"></p>
    <section id="timeline" class="timeline" aria-label="会话时间线"></section>
    <p id="empty" class="empty" hidden>没有符合当前筛选条件的提示词。</p>
    <footer class="footer">
      <span>只显示人类输入；不包含助手回复、工具输出或文件正文。</span>
      <span id="generated"></span>
    </footer>
  </main>

  <script>
    const DATA = __PROMPT_HARNESS_DATA__;
    const state = { platform: "all", query: "" };
    const eventById = new Map(DATA.events.map(event => [event.event_id, event]));
    const timeline = document.querySelector("#timeline");
    const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const fmt = value => value ? new Intl.DateTimeFormat("zh-CN", { dateStyle: "medium", timeStyle: "short" }).format(new Date(value)) : "时间未知";
    const modelText = event => event.model ? `${event.model}${event.model_source === "derived" ? " · 日志推导" : ""}` : "模型未记录";

    document.querySelector("#project-name").textContent = DATA.project.name || "Project timeline";
    document.querySelector("#event-total").textContent = DATA.events.length.toLocaleString();
    document.querySelector("#session-total").textContent = DATA.sessions.length.toLocaleString();
    document.querySelector("#generated").textContent = `索引生成于 ${fmt(DATA.generated_at)}`;

    function element(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function renderSession(session) {
      const events = session.event_ids.map(id => eventById.get(id)).filter(Boolean);
      const article = element("article", "session");
      article.dataset.platform = session.platform;
      article.dataset.sessionKey = session.session_key;

      const head = element("div", "session-head");
      const providerRow = element("div", "provider-row");
      providerRow.append(element("span", "provider", session.platform), element("span", "session-time", fmt(session.first_occurred_at)));
      head.append(providerRow, element("h2", "", session.title));
      const meta = element("p", "session-meta", `${session.prompt_count} 条人类提示词 · ${session.models.join(", ") || "模型未记录"}`);
      meta.append(element("span", "session-id", session.session_id));
      head.append(meta);

      const body = element("div", "session-body");
      const wrap = element("div", "track-wrap");
      const track = element("div", "track");
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("class", "pulse");
      svg.setAttribute("viewBox", "0 0 1000 84");
      svg.setAttribute("preserveAspectRatio", "none");
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", "M 0 42 L 1000 42");
      svg.append(path);
      track.append(svg);

      const start = Date.parse(session.first_occurred_at) || 0;
      const end = Date.parse(session.last_occurred_at) || start;
      const span = Math.max(end - start, 1);
      events.forEach((event, index) => {
        const at = Date.parse(event.occurred_at) || start;
        const ratio = events.length === 1 ? .5 : .035 + .93 * ((at - start) / span);
        const button = element("button", "node");
        button.type = "button";
        button.style.setProperty("--x", `${Math.max(3.5, Math.min(96.5, ratio * 100))}%`);
        button.dataset.eventId = event.event_id;
        button.setAttribute("aria-label", `P${String(event.number).padStart(5, "0")}，${fmt(event.occurred_at)}，${modelText(event)}`);
        button.setAttribute("aria-pressed", "false");
        track.append(button);
      });
      wrap.append(track);

      const detail = element("article", "detail");
      detail.dataset.open = "false";
      const detailMeta = element("div", "detail-meta");
      const prompt = element("pre", "prompt");
      detail.append(detailMeta, prompt);
      body.append(wrap, detail);
      article.append(head, body);

      track.addEventListener("click", event => {
        const button = event.target.closest(".node");
        if (!button) return;
        const selected = eventById.get(button.dataset.eventId);
        track.querySelectorAll(".node").forEach(node => node.setAttribute("aria-pressed", String(node === button)));
        detailMeta.replaceChildren();
        const provider = element("b", "", `P${String(selected.number).padStart(5, "0")} · ${selected.platform}`);
        detailMeta.append(provider, document.createElement("br"), document.createTextNode(fmt(selected.occurred_at)), document.createElement("br"), document.createTextNode(modelText(selected)), document.createElement("br"), document.createTextNode(`source: ${selected.source_mode || "unknown"}`), document.createElement("br"), document.createTextNode(`event_id: ${selected.event_id}`));
        prompt.textContent = selected.prompt;
        detail.dataset.open = "true";
      });

      if (!reducedMotion) {
        track.addEventListener("pointermove", event => {
          const rect = track.getBoundingClientRect();
          const px = (event.clientX - rect.left) / rect.width;
          const points = [];
          for (let i = 0; i <= 32; i += 1) {
            const x = i / 32;
            const influence = Math.exp(-Math.pow((x - px) / .12, 2));
            const y = 42 + Math.sin((x - px) * 35) * influence * 8;
            points.push(`${i ? "L" : "M"} ${x * 1000} ${y}`);
          }
          path.setAttribute("d", points.join(" "));
          track.querySelectorAll(".node").forEach(node => {
            const nx = parseFloat(node.style.getPropertyValue("--x")) / 100;
            const influence = Math.exp(-Math.pow((nx - px) / .13, 2));
            node.style.setProperty("--lift", `${Math.sin((nx - px) * 35) * influence * 8}px`);
          });
        });
        track.addEventListener("pointerleave", () => {
          path.setAttribute("d", "M 0 42 L 1000 42");
          track.querySelectorAll(".node").forEach(node => node.style.setProperty("--lift", "0px"));
        });
      }
      return article;
    }

    DATA.sessions.forEach(session => timeline.append(renderSession(session)));

    function applyFilters() {
      const query = state.query.trim().toLocaleLowerCase();
      let visibleSessions = 0;
      let visibleEvents = 0;
      timeline.querySelectorAll(".session").forEach(article => {
        const session = DATA.sessions.find(item => item.session_key === article.dataset.sessionKey);
        const events = session.event_ids.map(id => eventById.get(id)).filter(Boolean);
        const platformMatch = state.platform === "all" || session.platform === state.platform;
        const matching = events.filter(event => !query || `${event.prompt} ${event.model || ""} ${event.session_id}`.toLocaleLowerCase().includes(query));
        const show = platformMatch && matching.length > 0;
        article.hidden = !show;
        article.querySelectorAll(".node").forEach(node => {
          const event = eventById.get(node.dataset.eventId);
          const matched = !query || matching.includes(event);
          node.hidden = !matched;
        });
        if (show) {
          visibleSessions += 1;
          visibleEvents += matching.length;
        }
      });
      document.querySelector("#empty").hidden = visibleSessions !== 0;
      document.querySelector("#status").textContent = `当前显示 ${visibleSessions} 个会话，${visibleEvents} 条提示词`;
    }

    document.querySelector("#search").addEventListener("input", event => { state.query = event.target.value; applyFilters(); });
    document.querySelectorAll(".filter").forEach(button => button.addEventListener("click", () => {
      state.platform = button.dataset.filter;
      document.querySelectorAll(".filter").forEach(item => item.setAttribute("aria-pressed", String(item === button)));
      applyFilters();
    }));
    applyFilters();
  </script>
</body>
</html>
